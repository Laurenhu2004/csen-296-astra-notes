name: CI

# Shift-left quality gate. Lint (incl. NFR-2 import boundary), strict type-check,
# and the full pytest suite run on every push and pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12 and install deps (locked)
        run: uv sync --frozen

      - name: Ruff lint (includes NFR-2 View->repository/encryption import ban)
        run: uv run ruff check src tests

      - name: Mypy strict type-check
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -q
