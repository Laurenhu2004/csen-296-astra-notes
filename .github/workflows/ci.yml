name: CI

# Shift-left quality gate. Lint (incl. NFR-2 import boundary), strict type-check,
# and the full pytest suite run on every push and pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint (includes NFR-2 View->repository/encryption import ban)
        run: ruff check src tests

      - name: Mypy strict type-check
        run: mypy src

      - name: Pytest
        run: pytest -q
